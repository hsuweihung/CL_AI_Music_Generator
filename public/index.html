<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Music Generator — Lyria 3 POC</title>
<style>
  :root {
    --bg: #000000;
    --panel: #0d0d10;
    --card: #1a1a1e;
    --card-2: #202024;
    --border: #2a2a30;
    --text: #f2f2f4;
    --text-dim: #8b8b93;
    --blue: #2f6fed;
    --blue-dim: rgba(47, 111, 237, 0.16);
    --purple-a: #8b5cf6;
    --purple-b: #6d28d9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #050506;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 32px 12px;
  }
  .phone {
    width: 100%;
    max-width: 360px;
    background: var(--panel);
    border: 1px solid #1f6fed55;
    border-radius: 28px;
    box-shadow: 0 0 0 1px #0a0a0c, 0 20px 60px rgba(47,111,237,0.08);
    padding: 18px 16px 10px;
    position: relative;
  }

  /* header */
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--card); border: none; color: var(--text);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer;
  }
  .header h1 { font-size: 15px; font-weight: 600; margin: 0; flex: 1; }
  .credits {
    display: flex; align-items: center; gap: 4px;
    background: var(--card); border-radius: 14px;
    padding: 5px 10px; font-size: 13px; font-weight: 600;
    color: #4fc3f7;
  }

  section { margin-bottom: 18px; }
  .label { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .label .hint { color: var(--text-dim); font-weight: 400; }

  /* textarea */
  .textarea-wrap { position: relative; }
  textarea {
    width: 100%;
    min-height: 96px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    padding: 12px 14px 28px;
    font-size: 13.5px;
    resize: none;
    font-family: inherit;
  }
  textarea::placeholder { color: var(--text-dim); }
  textarea:focus { outline: none; border-color: var(--blue); }
  .ta-expand {
    position: absolute; top: 10px; right: 10px;
    color: var(--text-dim); pointer-events: none;
  }
  .ta-footer {
    position: absolute; left: 12px; right: 12px; bottom: 8px;
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text-dim);
  }
  .ta-clear { background: none; border: none; color: var(--text-dim); font-size: 11px; cursor: pointer; }

  /* genre / mood / theme tag picker */
  .tag-tabs { display: flex; gap: 18px; margin-bottom: 12px; }
  .tag-tab {
    border: none; background: transparent; color: var(--text-dim);
    font-size: 13.5px; font-weight: 600; padding: 6px 4px; cursor: pointer;
  }
  .tag-tab.active {
    background: var(--blue-dim); color: var(--blue);
    padding: 6px 14px; border-radius: 14px;
  }
  .tag-grid {
    display: grid;
    grid-template-rows: repeat(3, auto);
    grid-auto-flow: column;
    grid-auto-columns: max-content;
    gap: 8px;
    overflow-x: auto; overflow-y: hidden;
    padding-bottom: 6px;
    scrollbar-width: none;
  }
  .tag-grid::-webkit-scrollbar { display: none; }
  .tag-pill {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 7px 14px;
    font-size: 12.5px; color: var(--text); cursor: pointer;
  }
  .tag-pill.active { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }

  /* reference photo */
  .ref-header { display: flex; align-items: center; justify-content: space-between; }
  .ref-header .label { margin-bottom: 0; }
  .info-icon { color: var(--text-dim); cursor: default; }
  .upload-box {
    margin-top: 10px;
    border: 1.5px dashed var(--border);
    border-radius: 14px;
    padding: 22px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: var(--text-dim); font-size: 12.5px;
    cursor: pointer;
  }
  .upload-box:hover { border-color: var(--blue); color: var(--text); }
  .thumbs { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .thumb { position: relative; width: 52px; height: 52px; border-radius: 10px; overflow: hidden; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .thumb button {
    position: absolute; top: 2px; right: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: rgba(0,0,0,0.7); color: #fff; border: none;
    font-size: 10px; line-height: 1; cursor: pointer;
  }

  /* vocal toggle */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; }
  .segmented {
    display: flex; background: var(--card); border-radius: 12px; padding: 3px; gap: 2px;
  }
  .segmented button {
    border: none; background: transparent; color: var(--text-dim);
    font-size: 12.5px; font-weight: 600; padding: 6px 18px; border-radius: 9px; cursor: pointer;
  }
  .segmented button.active { background: var(--blue); color: #fff; }

  .hidden { display: none; }

  /* language select */
  select {
    width: 100%;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-size: 13px; padding: 10px 12px;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%238b8b93'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
  }

  /* sliders */
  .slider-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .slider-row .label { margin-bottom: 0; }
  .slider-row .value { font-size: 13px; color: var(--text-dim); }
  input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--card-2);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; cursor: pointer;
    box-shadow: 0 0 0 3px var(--blue);
  }

  /* generate button */
  .generate-btn {
    width: 100%;
    background: var(--blue);
    color: #fff; border: none; border-radius: 14px;
    padding: 14px; font-size: 15px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    cursor: pointer; margin-top: 4px;
  }
  .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .home-bar { width: 120px; height: 4px; background: #fff; border-radius: 2px; margin: 14px auto 4px; opacity: 0.7; }

  .status { text-align: center; font-size: 12.5px; color: var(--text-dim); margin-top: 10px; min-height: 16px; }

  .results { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .song-card { background: var(--card); border-radius: 12px; padding: 10px 12px; }
  .song-card .title { font-size: 12.5px; font-weight: 600; margin-bottom: 6px; }
  .song-card audio { width: 100%; height: 32px; }
  .song-card a { font-size: 11px; color: #4fc3f7; text-decoration: none; }
  .song-card pre { white-space: pre-wrap; font-size: 11px; color: var(--text-dim); margin: 6px 0 0; }

  /* log panel */
  .log-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: flex-end; justify-content: center; z-index: 50;
  }
  .log-overlay.open { display: flex; }
  .log-panel {
    width: 100%; max-width: 360px; max-height: 78vh;
    background: #101014; border: 1px solid var(--border); border-bottom: none;
    border-radius: 20px 20px 0 0;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .log-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    font-weight: 700; font-size: 14px; flex-shrink: 0;
  }
  .log-panel-header .icon-btn { width: 26px; height: 26px; font-size: 14px; }
  .log-list { overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .log-empty { text-align: center; color: var(--text-dim); font-size: 12.5px; padding: 24px 0; }
  .log-entry { background: var(--card); border-radius: 10px; padding: 10px 12px; }
  .log-entry .log-meta {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--text-dim); margin-bottom: 6px;
  }
  .log-status {
    display: inline-block; padding: 2px 8px; border-radius: 8px;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
  }
  .log-status.pending { background: rgba(245,158,11,0.2); color: #f59e0b; }
  .log-status.success { background: rgba(34,197,94,0.2); color: #22c55e; }
  .log-status.partial { background: rgba(245,158,11,0.2); color: #f59e0b; }
  .log-status.error { background: rgba(239,68,68,0.2); color: #ef4444; }
  .log-entry summary { cursor: pointer; font-size: 12px; font-weight: 600; padding: 4px 0; }
  .log-entry pre {
    white-space: pre-wrap; word-break: break-all;
    background: #000; border-radius: 8px; padding: 8px;
    margin: 4px 0 0; font-size: 10.5px; line-height: 1.5;
    max-height: 220px; overflow-y: auto; color: #a3e635;
  }
</style>
</head>
<body>
<div class="phone">

  <div class="header">
    <button class="icon-btn" title="返回">‹</button>
    <h1>AI Music Generator</h1>
    <div class="credits">◆ <span id="credits">182</span></div>
    <button class="icon-btn" id="logToggleBtn" title="Log">▤</button>
  </div>

  <section>
    <div class="label">Describe your idea</div>
    <div class="textarea-wrap">
      <textarea id="prompt" placeholder="Describe the music, instrumentation, mood, BPM, structure, and lyrics direction">A short instrumental acoustic guitar piece, warm and relaxing.</textarea>
      <span class="ta-expand">⤢</span>
      <div class="ta-footer">
        <span id="charCount">0/5000</span>
        <button class="ta-clear" id="clearBtn">Clear</button>
      </div>
    </div>
  </section>

  <section>
    <div class="tag-tabs" id="tagTabs">
      <button class="tag-tab active" data-tab="genre">Genre</button>
      <button class="tag-tab" data-tab="mood">Mood</button>
      <button class="tag-tab" data-tab="theme">Theme</button>
    </div>
    <div class="tag-grid" id="tagGrid"></div>
  </section>

  <section>
    <div class="ref-header">
      <div class="label">Import Reference Photo (Optional) <span class="info-icon">ⓘ</span></div>
    </div>
    <div class="upload-box" id="uploadBox">
      <span>🖼️</span>
      <span id="uploadText">Add up to 10 reference photos</span>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple hidden>
    <div class="thumbs" id="thumbs"></div>
  </section>

  <section>
    <div class="toggle-row">
      <div class="label">Vocal</div>
      <div class="segmented" id="vocalToggle">
        <button data-value="on">On</button>
        <button data-value="off" class="active">Off</button>
      </div>
    </div>
  </section>

  <section id="languageSection" class="hidden">
    <div class="label">Language</div>
    <select id="language">
      <option value="auto" selected>Auto (follow prompt language)</option>
      <option value="English">English</option>
      <option value="Mandarin Chinese">Mandarin Chinese</option>
      <option value="Japanese">Japanese</option>
      <option value="Korean">Korean</option>
      <option value="Spanish">Spanish</option>
    </select>
  </section>

  <section id="genderSection" class="hidden">
    <div class="toggle-row">
      <div class="label">Vocal Gender</div>
      <div class="segmented" id="genderToggle">
        <button data-value="female" class="active">Female</button>
        <button data-value="male">Male</button>
      </div>
    </div>
  </section>

  <section>
    <div class="slider-row">
      <div class="label">Estimated song length</div>
      <div class="value" id="durationLabel">00:01:30</div>
    </div>
    <input type="range" id="duration" min="10" max="240" step="5" value="90">
  </section>

  <section>
    <div class="slider-row">
      <div class="label">Number of song</div>
      <div class="value" id="numSongsLabel">2/5</div>
    </div>
    <input type="range" id="numSongs" min="1" max="5" step="1" value="2">
  </section>

  <button class="generate-btn" id="generateBtn">Generate for <span>◆</span> <span id="cost">6</span></button>

  <div class="status" id="status"></div>
  <div class="results" id="results"></div>

  <div class="home-bar"></div>
</div>

<div class="log-overlay" id="logOverlay">
  <div class="log-panel">
    <div class="log-panel-header">
      <span>Request Log</span>
      <button class="icon-btn" id="closeLogBtn">×</button>
    </div>
    <div class="log-list" id="logList">
      <div class="log-empty" id="logEmpty">還沒有生成紀錄</div>
    </div>
  </div>
</div>

<script>
const promptEl = document.getElementById('prompt');
const charCount = document.getElementById('charCount');
const clearBtn = document.getElementById('clearBtn');
const vocalToggle = document.getElementById('vocalToggle');
const languageEl = document.getElementById('language');
const languageSection = document.getElementById('languageSection');
const genderToggle = document.getElementById('genderToggle');
const genderSection = document.getElementById('genderSection');
const durationEl = document.getElementById('duration');
const durationLabel = document.getElementById('durationLabel');
const numSongsEl = document.getElementById('numSongs');
const numSongsLabel = document.getElementById('numSongsLabel');
const costEl = document.getElementById('cost');
const generateBtn = document.getElementById('generateBtn');
const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');
const creditsEl = document.getElementById('credits');
const uploadBox = document.getElementById('uploadBox');
const fileInput = document.getElementById('fileInput');
const thumbsEl = document.getElementById('thumbs');
const logToggleBtn = document.getElementById('logToggleBtn');
const closeLogBtn = document.getElementById('closeLogBtn');
const logOverlay = document.getElementById('logOverlay');
const logListEl = document.getElementById('logList');
const logEmptyEl = document.getElementById('logEmpty');
const tagTabs = document.getElementById('tagTabs');
const tagGrid = document.getElementById('tagGrid');

let vocalOn = false;
let genderValue = 'female';
let images = []; // { mimeType, data(base64), previewUrl }
let logs = []; // { id, time, status, request, response }

// Genre/Mood/Theme 不是獨立維護的勾選狀態，點了直接把 tag 文字寫進 textarea
// （例如 "原本的" -> "原本的, Jazz"），送給後端時就是普通 prompt 文字的一部分，
// 不需要另外送一個結構化的 tags 欄位。pill 亮不亮，也是直接檢查 textarea 目前
// 的內容裡有沒有這段文字來判斷，就算使用者手動編輯過 textarea，畫面也不會兜不起來。
const TAG_OPTIONS = {
  genre: [
    'Acoustic', 'Hip Hop', 'Beats', 'Funk', 'Pop', 'Drum n Bass', 'Trap', 'Tokyo night pop',
    'Rock', 'Latin', 'House', 'Tropical House', 'Ambient', 'Orchestra', 'Electro & Dance',
    'Electronica', 'Techno & Trance', 'Jersey Club', 'Drill', 'R&B', 'Lofi Hip Hop', 'World',
    'Afrobeats', 'Christmas',
  ],
  mood: [
    'Angry', 'Busy & Frantic', 'Dark', 'Dreamy', 'Elegant', 'Epic', 'Euphoric', 'Fear',
    'Funny & Weird', 'Glamorous', 'Happy', 'Heavy & Ponderous', 'Hopeful', 'Laid Back',
    'Mysterious', 'Peaceful', 'Restless', 'Romantic', 'Running', 'Sad', 'Scary', 'Sentimental',
    'Sexy', 'Smooth', 'Suspense',
  ],
  theme: [
    'Ads & Trailers', 'Broadcasting', 'Cinematic', 'Corporate', 'Comedy', 'Cooking',
    'Documentary', 'Drama', 'Fashion & Beauty', 'Gaming', 'Holiday Season', 'Horror & Thriller',
    'Motivational & Inspiring', 'Nature', 'Photography', 'Sports & Action', 'Technology',
    'Travel', 'Tutorials', 'Vlogs', 'Wedding & Romance', 'Workout & Wellness',
  ],
};
let activeTagTab = 'genre';

function tagInsertText(tag) {
  return `, ${tag}`;
}

function isTagActive(tag) {
  return promptEl.value.includes(tagInsertText(tag));
}

function renderTagGrid() {
  tagGrid.innerHTML = TAG_OPTIONS[activeTagTab].map((tag) => `
    <button class="tag-pill ${isTagActive(tag) ? 'active' : ''}" data-tag="${tag}">${tag}</button>
  `).join('');
}

tagTabs.addEventListener('click', (e) => {
  const btn = e.target.closest('.tag-tab');
  if (!btn) return;
  activeTagTab = btn.dataset.tab;
  tagTabs.querySelectorAll('.tag-tab').forEach((b) => b.classList.toggle('active', b === btn));
  renderTagGrid();
});

tagGrid.addEventListener('click', (e) => {
  const btn = e.target.closest('.tag-pill');
  if (!btn) return;
  const tag = btn.dataset.tag;
  const insertText = tagInsertText(tag);
  if (promptEl.value.includes(insertText)) {
    promptEl.value = promptEl.value.replace(insertText, '');
  } else {
    promptEl.value += insertText;
  }
  updateCharCount();
  renderTagGrid();
});

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderLogs() {
  logEmptyEl.style.display = logs.length ? 'none' : 'block';
  logListEl.querySelectorAll('.log-entry').forEach((el) => el.remove());

  logs.forEach((log, i) => {
    const el = document.createElement('div');
    el.className = 'log-entry';
    el.innerHTML = `
      <div class="log-meta">
        <span>${log.time}</span>
        <span class="log-status ${log.status}">${log.status}</span>
      </div>
      <details ${i === 0 ? 'open' : ''}>
        <summary>送給 Lyria 3 的內容 →</summary>
        <pre>${escapeHtml(JSON.stringify(log.request, null, 2))}</pre>
      </details>
      <details ${i === 0 ? 'open' : ''}>
        <summary>← Lyria 3 回傳的內容</summary>
        <pre>${escapeHtml(JSON.stringify(log.response ?? '(等待中...)', null, 2))}</pre>
      </details>
    `;
    logListEl.appendChild(el);
  });
}

logToggleBtn.addEventListener('click', () => logOverlay.classList.add('open'));
closeLogBtn.addEventListener('click', () => logOverlay.classList.remove('open'));
logOverlay.addEventListener('click', (e) => {
  if (e.target === logOverlay) logOverlay.classList.remove('open');
});

// Lyria 3 官方 input token 上限是 131,072（clip 與 pro 兩個模型相同），這裡的 5000
// 字元是我們自訂、更貼近日常使用的產品層級上限，不分語言統一套用，遠低於 API 真正上限。
const MAX_CHARS = 5000;

function updateCharCount() {
  if (promptEl.value.length > MAX_CHARS) {
    promptEl.value = promptEl.value.slice(0, MAX_CHARS);
  }
  charCount.textContent = `${promptEl.value.length}/${MAX_CHARS}`;
  renderTagGrid(); // 使用者手動編輯 textarea 時，pill 亮不亮也要跟著重新計算
}
promptEl.addEventListener('input', updateCharCount);
updateCharCount();

clearBtn.addEventListener('click', () => {
  promptEl.value = '';
  updateCharCount();
});

vocalToggle.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  vocalOn = btn.dataset.value === 'on';
  vocalToggle.querySelectorAll('button').forEach((b) => b.classList.toggle('active', b === btn));
  languageSection.classList.toggle('hidden', !vocalOn);
  genderSection.classList.toggle('hidden', !vocalOn);
});

genderToggle.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  genderValue = btn.dataset.value;
  genderToggle.querySelectorAll('button').forEach((b) => b.classList.toggle('active', b === btn));
});

function formatDuration(totalSeconds) {
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  return `00:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}
function updateDurationLabel() {
  durationLabel.textContent = formatDuration(Number(durationEl.value));
}
durationEl.addEventListener('input', updateDurationLabel);
updateDurationLabel();

function updateNumSongsLabel() {
  numSongsLabel.textContent = `${numSongsEl.value}/5`;
  costEl.textContent = Number(numSongsEl.value) * 3;
}
numSongsEl.addEventListener('input', updateNumSongsLabel);
updateNumSongsLabel();

uploadBox.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', async () => {
  const files = Array.from(fileInput.files).slice(0, 10 - images.length);
  for (const file of files) {
    const data = await fileToBase64(file);
    images.push({ mimeType: file.type, data, previewUrl: URL.createObjectURL(file) });
  }
  fileInput.value = '';
  renderThumbs();
});

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderThumbs() {
  thumbsEl.innerHTML = '';
  images.forEach((img, i) => {
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `<img src="${img.previewUrl}"><button data-i="${i}">×</button>`;
    thumbsEl.appendChild(div);
  });
  uploadBox.querySelector('#uploadText').textContent =
    images.length ? `${images.length}/10 photos added` : 'Add up to 10 reference photos';
}
thumbsEl.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  images.splice(Number(btn.dataset.i), 1);
  renderThumbs();
});

generateBtn.addEventListener('click', async () => {
  const prompt = promptEl.value.trim();
  if (!prompt) {
    statusEl.textContent = '請先輸入描述。';
    return;
  }

  const payload = {
    prompt,
    vocal: vocalOn,
    language: vocalOn ? languageEl.value : null,
    gender: vocalOn ? genderValue : null,
    durationSeconds: Number(durationEl.value),
    numSongs: Number(numSongsEl.value),
    images: images.map(({ mimeType, data }) => ({ mimeType, data })),
  };

  // Log 面板裡不放圖片 base64 本體，只留張數跟長度，避免洗版
  const loggableRequest = {
    ...payload,
    images: payload.images.map((img) => ({ mimeType: img.mimeType, dataLength: img.data.length })),
  };
  const logEntry = {
    time: new Date().toLocaleTimeString('zh-TW', { hour12: false }),
    status: 'pending',
    request: loggableRequest,
    response: null,
  };
  logs.unshift(logEntry);
  renderLogs();

  generateBtn.disabled = true;
  statusEl.textContent = `生成中（${payload.numSongs} 首），請稍候...`;
  resultsEl.innerHTML = '';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();

    logEntry.response = data.debug || data;
    logEntry.status = data.debug?.status || (res.ok ? 'success' : 'error');
    renderLogs();

    if (!res.ok) throw new Error(data.error || '生成失敗');

    statusEl.textContent = `完成（模型：${data.model}）`;
    creditsEl.textContent = Math.max(0, Number(creditsEl.textContent) - Number(costEl.textContent));

    data.songs.forEach((song, i) => {
      const card = document.createElement('div');
      card.className = 'song-card';
      const url = `data:${song.mimeType};base64,${song.audioBase64}`;
      card.innerHTML = `
        <div class="title">Song ${i + 1}</div>
        <audio controls src="${url}"></audio>
        <a href="${url}" download="lyria-song-${i + 1}.mp3">下載音檔</a>
        ${song.lyrics ? `<pre>${song.lyrics}</pre>` : ''}
      `;
      resultsEl.appendChild(card);
    });
  } catch (err) {
    if (!logEntry.response) {
      logEntry.response = { error: err.message };
      logEntry.status = 'error';
      renderLogs();
    }
    statusEl.textContent = '錯誤：' + err.message;
  } finally {
    generateBtn.disabled = false;
  }
});
</script>
</body>
</html>
